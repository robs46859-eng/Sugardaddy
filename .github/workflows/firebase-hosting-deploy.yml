name: Deploy to Firebase Hosting on push to main

on:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        run: npm run build

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/899325565183/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
          service_account: 'github-actions-deploy@vertex1-490112.iam.gserviceaccount.com'
          token_format: 'access_token'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy to Firebase Hosting
        run: firebase deploy --only hosting --project vertex1-490112 --token "${{ steps.auth.outputs.access_token }}"

      # Note: a "Deploy to Cloud Run" step previously lived here, deploying the
      # Express backend to a `sugardaddy-api` Cloud Run service. It's removed
      # because the live app (frontend + /api backend) is served entirely from
      # Hostinger, so this Firebase Hosting workflow only needs to publish the
      # static build. Re-add a Cloud Run (or similar) deploy step here if the
      # backend is ever moved off Hostinger.
