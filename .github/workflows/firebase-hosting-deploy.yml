name: Deploy to Firebase Hosting on push to main

on:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        run: npm run build

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/899325565183/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
          service_account: 'github-actions-deploy@vertex1-490112.iam.gserviceaccount.com'
          token_format: 'access_token'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy to Firebase Hosting
        run: firebase deploy --only hosting --project vertex1-490112 --token "${{ steps.auth.outputs.access_token }}"

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: 'sugardaddy-api'
          region: 'us-central1'
          source: '.'
          env_vars: |
            NODE_ENV=production
            SQL_HOST=${{ secrets.SQL_HOST }}
            SQL_USER=${{ secrets.SQL_USER }}
            SQL_PASSWORD=${{ secrets.SQL_PASSWORD }}
            SQL_DB_NAME=${{ secrets.SQL_DB_NAME }}
            STRIPE_SECRET_KEY=${{ secrets.STRIPE_SECRET_KEY }}
            STRIPE_WEBHOOK_SECRET=${{ secrets.STRIPE_WEBHOOK_SECRET }}
