# Firebase Hosting is DECOMMISSIONED as an app host.
# The live application (frontend + /api backend) is served entirely from
# Hostinger. This workflow only publishes a static "site moved" placeholder
# (firebase-public/) to the old vertex1-490112.web.app address.
#
# To take the Firebase site down completely, run locally:
#   firebase hosting:disable --project vertex1-490112
# and delete this workflow.

name: Publish Firebase Hosting placeholder

on:
  push:
    branches:
      - main
    paths:
      - 'firebase-public/**'
      - 'firebase.json'
      - '.github/workflows/firebase-hosting-deploy.yml'

permissions:
  contents: read
  id-token: write

jobs:
  deploy_placeholder:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/899325565183/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
          service_account: 'github-actions-deploy@vertex1-490112.iam.gserviceaccount.com'
          token_format: 'access_token'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools@14

      - name: Deploy placeholder to Firebase Hosting
        run: firebase deploy --only hosting --project vertex1-490112 --token "${{ steps.auth.outputs.access_token }}"
